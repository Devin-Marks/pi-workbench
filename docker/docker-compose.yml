# Single-tenant pi-forge. Run from the repo root:
#
#   cp docker/.env.example docker/.env   # first time only — edit secrets
#   docker compose -f docker/docker-compose.yml --env-file docker/.env up -d --build
#
# Or `cd docker && docker compose up -d --build` — Compose auto-loads the
# .env file sitting next to the compose file.
#
# The build context is the repo root (..) so the Dockerfile sees the
# whole monorepo. .dockerignore at the root keeps node_modules / .git /
# dist out of the build context.

services:
  pi-forge:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        # Match the container `pi` user to the host UID/GID so bind
        # mounts under /workspace and /home/pi/.pi-forge are
        # writable. Default 1000:1000 covers most interactive Linux
        # accounts; override in `.env` to match `id -u` / `id -g`.
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
    image: pi-forge:latest
    container_name: ${CONTAINER_NAME:-pi-forge}
    restart: unless-stopped
    ports:
      # Bind to localhost ONLY by default. Operators who want LAN access
      # can change this to "${HOST_PORT:-3000}:3000" (no 127.0.0.1: prefix)
      # — but should ALSO set UI_PASSWORD (or API_KEY) first,
      # since the container speaks plain HTTP. Per SECURITY.md, never
      # network-expose without TLS at a reverse proxy.
      - "127.0.0.1:${HOST_PORT:-3000}:3000"
    volumes:
      # User code lives here. Projects are subfolders. Keep this on a
      # disk you back up.
      - ${WORKSPACE_HOST_PATH:-../workspace}:/workspace
      # Share the host's pi config so the container inherits provider
      # auth and models.json without duplication. Inside the container
      # this resolves to /home/pi/.pi/agent (matching PI_CONFIG_DIR).
      - ${PI_CONFIG_HOST_PATH:-~/.pi/agent}:/home/pi/.pi/agent
      # Forge-owned state (projects.json). Kept in its own dir so
      # we don't mix our state into the pi SDK's config layout. Default
      # gives the container its OWN project list — host vs container
      # are isolated. Point both at the same host path if you want the
      # registry shared.
      - ${FORGE_DATA_HOST_PATH:-~/.pi-forge-docker}:/home/pi/.pi-forge
    environment:
      # Container-internal paths — fixed.
      - WORKSPACE_PATH=/workspace
      - PI_CONFIG_DIR=/home/pi/.pi/agent
      - FORGE_DATA_DIR=/home/pi/.pi-forge
      - PORT=3000
      # Auth — read from .env. Empty values keep auth disabled.
      # UI_PASSWORD is the INITIAL password; once changed via the UI
      # the scrypt hash at ${FORGE_DATA_DIR}/password-hash takes
      # over and this env value is ignored. REQUIRE_PASSWORD_CHANGE
      # (default true) forces the user to pick a new password on
      # first login when only UI_PASSWORD is set.
      - UI_PASSWORD=${UI_PASSWORD:-}
      - REQUIRE_PASSWORD_CHANGE=${REQUIRE_PASSWORD_CHANGE:-true}
      - JWT_SECRET=${JWT_SECRET:-}
      - API_KEY=${API_KEY:-}
      # Logging + reverse-proxy hint.
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - TRUST_PROXY=${TRUST_PROXY:-false}
      - CORS_ORIGIN=${CORS_ORIGIN:-}
      # Frontend "minimal" mode — hides terminal, git pane, last-turn
      # pane, and providers/agent settings; project create asks for a
      # name only and auto-mkdirs under WORKSPACE_PATH. Server routes
      # are unchanged. Use for locked-down deployments where provider
      # config is managed at the deploy level.
      - MINIMAL_UI=${MINIMAL_UI:-false}
    # Container hardening (mirrors what the k8s manifests already apply).
    # Skipping `read_only: true` because the agent's bash tool commonly
    # needs to write to /home/pi/.npm, /home/pi/.cache, /tmp, etc. for
    # `npm install`, `pip install`, `git clone`. Operators with a more
    # restricted use case can add `read_only: true` + a tmpfs for /tmp,
    # /home/pi/.npm at their discretion.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Cap process count to defang fork-bombs from a runaway agent
    # process or a hostile bash command. 512 is well above any realistic
    # interactive shell + tool subprocess depth.
    pids_limit: 512
    # Resource limits — keep a misbehaving agent from filling the host's
    # memory or starving the host CPU. Operators with heavier needs can
    # raise these via override or a docker-compose.override.yml.
    mem_limit: 2g
    cpus: "1.0"
    # ~/.pi/agent is bind-mounted read-write so pi-forge can update
    # auth.json. This means a container escape (kernel CVE, runc CVE)
    # would gain write access to every provider key the operator has
    # configured. Documented trade-off; the alternative (read-only mount
    # + out-of-band key updates) is too friction-heavy for the typical
    # single-tenant workflow.
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
