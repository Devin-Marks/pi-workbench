apiVersion: v1
kind: Namespace
metadata:
  name: pi-workbench
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pi-workbench
  namespace: pi-workbench
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pi-workbench-workspace
  namespace: pi-workbench
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pi-workbench-pi-config
  namespace: pi-workbench
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pi-workbench-data
  namespace: pi-workbench
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: pi-workbench
  namespace: pi-workbench
spec:
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: pi-workbench
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: pi-workbench
  namespace: pi-workbench
spec:
  to:
    kind: Service
    name: pi-workbench
  port:
    targetPort: http
