apiVersion: apps/v1
kind: Deployment
metadata:
  name: pi-workbench
  namespace: pi-workbench
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pi-workbench
  template:
    metadata:
      labels:
        app: pi-workbench
    spec:
      # Pod-level security context — these apply to every container.
      # `fsGroup` + `fsGroupChangePolicy: OnRootMismatch` lets the kubelet
      # chown the volume mounts to GID 1000 on first attach, replacing
      # the previous `chmod -R 777` init container (which was a wildly
      # permissive mode that defeated the purpose of fsGroup).
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: volume-permissions
          # Init container kept for clusters whose CSI driver doesn't
          # honor fsGroup. Replaces the previous `chmod -R 777` with the
          # narrower `chown 1000:1000` + `chmod 700` (writes only by
          # owner) so a container escape can't read /home/pi/.pi/agent's
          # auth.json from another UID. If your CSI driver applies
          # fsGroup correctly, you can delete this init container
          # entirely — kubelet will do the chown for you.
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "mkdir -p /workspace /home/pi/.pi/agent /home/pi/.pi-workbench && chown -R 1000:1000 /workspace /home/pi/.pi/agent /home/pi/.pi-workbench && chmod 700 /workspace /home/pi/.pi/agent /home/pi/.pi-workbench || true",
            ]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              # CHOWN is required for `chown -R 1000:1000`. Without it
              # the init container fails on the chown step. We don't
              # need to run as root for this — the busybox shell does
              # the chown via its own UID.
              add: ["CHOWN", "FOWNER"]
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
              cpu: 100m
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: pi-config
              mountPath: /home/pi/.pi/agent
            - name: workbench-data
              mountPath: /home/pi/.pi-workbench
      containers:
        - name: pi-workbench
          image: pi-workbench:latest
          imagePullPolicy: IfNotPresent
          # Container-level security context. The application only writes
          # to bind-mounted volumes (workspace, pi-config, workbench-data),
          # so the root filesystem can be read-only.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "3000"
            - name: WORKSPACE_PATH
              value: /workspace
            - name: PI_CONFIG_DIR
              value: /home/pi/.pi/agent
            - name: WORKBENCH_DATA_DIR
              value: /home/pi/.pi-workbench
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: LOG_LEVEL
              value: info
            - name: TRUST_PROXY
              value: "false"
            - name: CORS_ORIGIN
              value: ""
            - name: MINIMAL_UI
              value: "false"
            # When `true` (default) and the user logs in with the
            # secret-supplied UI_PASSWORD AND no on-disk hash exists
            # yet, the issued token is scoped to POST /auth/change-
            # password — the UI forces the user to pick a new password
            # before any other API call works. The new password's
            # scrypt hash is persisted to
            # ${WORKBENCH_DATA_DIR}/password-hash on the data-dir PVC
            # and the secret-supplied UI_PASSWORD is ignored on
            # subsequent logins. Set to "false" to keep the
            # secret-supplied password as the canonical credential
            # (e.g. when it's rotated by an external operator).
            - name: REQUIRE_PASSWORD_CHANGE
              value: "true"
            # JWT_SECRET is OPTIONAL. When UI_PASSWORD is set and
            # JWT_SECRET is unset, the server generates one on first
            # boot and persists it to ${WORKBENCH_DATA_DIR}/jwt-secret
            # on the data-dir PVC, so issued tokens survive restarts.
            # Set it explicitly only if you want to manage rotation
            # out-of-band.
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pi-workbench-secret
                  key: JWT_SECRET
                  optional: true
            - name: UI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pi-workbench-secret
                  key: UI_PASSWORD
                  optional: true
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: pi-workbench-secret
                  key: API_KEY
                  optional: true
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 10
            timeoutSeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 5
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: "1"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: pi-config
              mountPath: /home/pi/.pi/agent
            - name: workbench-data
              mountPath: /home/pi/.pi-workbench
            # /tmp is required by the agent's bash tool — `mktemp`,
            # `pip install`, `npm install`, `git clone` all write here.
            # readOnlyRootFilesystem:true (set on the container security
            # context above) blocks /tmp writes without this emptyDir.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: pi-workbench-workspace
        - name: pi-config
          persistentVolumeClaim:
            claimName: pi-workbench-pi-config
        - name: workbench-data
          persistentVolumeClaim:
            claimName: pi-workbench-data
        # emptyDir for /tmp because the container has
        # readOnlyRootFilesystem:true. 256Mi is generous for the
        # agent's typical mktemp / npm cache / git clone scratch use.
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
