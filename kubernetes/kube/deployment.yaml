apiVersion: apps/v1
kind: Deployment
metadata:
  name: pi-workbench
  namespace: pi-workbench
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pi-workbench
  template:
    metadata:
      labels:
        app: pi-workbench
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: volume-permissions
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "mkdir -p /workspace /home/pi/.pi/agent /home/pi/.pi-workbench && chmod -R 777 /workspace /home/pi/.pi/agent /home/pi/.pi-workbench || true",
            ]
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: pi-config
              mountPath: /home/pi/.pi/agent
            - name: workbench-data
              mountPath: /home/pi/.pi-workbench
      containers:
        - name: pi-workbench
          image: pi-workbench:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "3000"
            - name: WORKSPACE_PATH
              value: /workspace
            - name: PI_CONFIG_DIR
              value: /home/pi/.pi/agent
            - name: WORKBENCH_DATA_DIR
              value: /home/pi/.pi-workbench
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: LOG_LEVEL
              value: info
            - name: TRUST_PROXY
              value: "false"
            - name: CORS_ORIGIN
              value: ""
            - name: MINIMAL_UI
              value: "false"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pi-workbench-secret
                  key: JWT_SECRET
            - name: UI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pi-workbench-secret
                  key: UI_PASSWORD
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: pi-workbench-secret
                  key: API_KEY
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 10
            timeoutSeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 5
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: "1"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: pi-config
              mountPath: /home/pi/.pi/agent
            - name: workbench-data
              mountPath: /home/pi/.pi-workbench
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: pi-workbench-workspace
        - name: pi-config
          persistentVolumeClaim:
            claimName: pi-workbench-pi-config
        - name: workbench-data
          persistentVolumeClaim:
            claimName: pi-workbench-data
