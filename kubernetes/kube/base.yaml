apiVersion: v1
kind: Namespace
metadata:
  name: pi-workbench
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pi-workbench-workspace
  namespace: pi-workbench
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pi-workbench-pi-config
  namespace: pi-workbench
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pi-workbench-data
  namespace: pi-workbench
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: pi-workbench
  namespace: pi-workbench
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: pi-workbench
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pi-workbench
  namespace: pi-workbench
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: pi-workbench.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pi-workbench
                port:
                  number: 3000
