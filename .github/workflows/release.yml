name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  # GHCR rejects mixed-case repository names. `github.repository_owner`
  # preserves the original casing of the GitHub username (e.g.
  # `Devin-Marks`), which would push to `ghcr.io/Devin-Marks/...` and
  # fail with "repository name must be lowercase". Each job sets
  # IMAGE_NAME to the lowercased value via GITHUB_ENV in a setup step.
  IMAGE_BASE: pi-workbench

jobs:
  # Gate the release on the tag and the in-tree versions agreeing.
  # Catches the "tagged v1.0.1 but forgot to bump package.json" mistake
  # before we spend ~10 minutes building two-arch images that would ship
  # mislabeled. All three workspace package.json files are checked because
  # `scripts/bump-version.sh` moves them in lockstep — drift means
  # someone bumped manually and forgot one.
  check-version:
    name: Verify tag matches package.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare tag against package.json versions
        run: |
          tag="${GITHUB_REF_NAME#v}"
          echo "Tag version: $tag"
          fail=0
          for f in package.json packages/server/package.json packages/client/package.json; do
            v=$(node -p "require('./$f').version")
            if [ "$v" != "$tag" ]; then
              echo "::error file=$f::version $v does not match tag $tag"
              fail=1
            else
              echo "  $f -> $v ✓"
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::Tag/package.json version drift. Re-run scripts/bump-version.sh and re-tag." >&2
            exit 1
          fi

  build:
    name: Build ${{ matrix.platform }}
    needs: check-version
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image name
        # GHCR requires lowercase repo names; ${{ github.repository_owner }}
        # preserves the original casing. Lowercase via bash parameter
        # expansion and export to GITHUB_ENV so subsequent steps see it
        # as ${{ env.IMAGE_NAME }}.
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "IMAGE_NAME=${OWNER,,}/${IMAGE_BASE}" >> "$GITHUB_ENV"

      - name: Prepare platform pair
        id: prep
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ steps.prep.outputs.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ steps.prep.outputs.PLATFORM_PAIR }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.prep.outputs.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    permissions:
      # contents: write needed by the GitHub Release creation step below;
      # packages: write needed by the manifest push.
      contents: write
      packages: write
    steps:
      - name: Checkout
        # Needed so the changelog-extraction step can read CHANGELOG.md.
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        # See the matching step in the build job for rationale.
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "IMAGE_NAME=${OWNER,,}/${IMAGE_BASE}" >> "$GITHUB_ENV"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

      - name: Extract release notes from CHANGELOG
        # Pulls the section under `## [<version>]` out of CHANGELOG.md and
        # writes it to /tmp/release-notes.md. If the section is missing or
        # empty, the next step falls back to GitHub's auto-generated notes.
        id: notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            BEGIN { found = 0 }
            /^## \[/ {
              if (found) exit
              if ($0 ~ "^## \\[" ver "\\]") { found = 1; next }
            }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          # Trim leading/trailing blank lines.
          sed -i -e '/./,$!d' -e ':a;/^\n*$/{$d;N;ba' -e '}' /tmp/release-notes.md || true
          if [ -s /tmp/release-notes.md ]; then
            echo "have_notes=true" >> "$GITHUB_OUTPUT"
            echo "Extracted CHANGELOG section for $version ($(wc -l </tmp/release-notes.md) lines)"
          else
            echo "have_notes=false" >> "$GITHUB_OUTPUT"
            echo "No CHANGELOG section for $version — will use auto-generated notes"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.have_notes == 'true' && '/tmp/release-notes.md' || '' }}
          generate_release_notes: ${{ steps.notes.outputs.have_notes != 'true' }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: false
